<!DOCTYPE html>
<html>
<head>
    <title>Cricket Tournament Registration</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>ARNAV FOUNDATION</h1>
    <h3>Summer Cricket Tournament 2026</h3>

    <form action="/submit" method="POST">

        <div class="section">
            <h2>Team Details</h2>
            <input type="text" name="team" placeholder="Team Name" required>
            <input type="text" name="contact" placeholder="Contact Person" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
        </div>

        <div class="section">
            <h2>Players (7-a-side)</h2>
            <input type="text" name="p1" placeholder="Player 1 (Captain)" required>
            <input type="text" name="p2" placeholder="Player 2">
            <input type="text" name="p3" placeholder="Player 3">
            <input type="text" name="p4" placeholder="Player 4">
            <input type="text" name="p5" placeholder="Player 5">
            <input type="text" name="p6" placeholder="Player 6">
            <input type="text" name="p7" placeholder="Player 7">
        </div>

        <button type="submit">Submit & Generate PDF</button>

    </form>
</div>

</body>
</html>
